    <p style="margin-bottom:13px;"><strong style="color:var(--text);font-weight:500;">1. Rapid GenAI adoption.</strong> Microsoft (2025) reports 86% of education organisations use generative AI — the highest rate across all industries. The market no longer needs to be convinced AI has value; the question is which tools institutions trust and how they want them governed.</p>
    <p style="margin-bottom:13px;"><strong style="color:var(--text);font-weight:500;">2. Teacher workload crisis.</strong> Competitor messaging across MagicSchool, Khanmigo, and SchoolAI converges on time savings and reduced administrative burden — confirming productivity is the core value proposition in this category.</p>
    <p style="margin-bottom:13px;"><strong style="color:var(--text);font-weight:500;">3. Safe, human-centred AI emphasis.</strong> UNESCO's guidance for generative AI in education and its AI competency framework for teachers both signal that privacy, governance, and educator readiness are increasingly central to the adoption decision. (UNESCO, 2023; 2024)</p>
    <p><strong style="color:var(--text);font-weight:500;">4. Policy momentum in India.</strong> The Ministry of Education announced a Centre of Excellence in AI for Education with a Rs. 500 crore outlay in the Union Budget 2025-26. (MoE, 2025a; CBSE, 2022)</p>

<div class="stl">The Problem Aidra-E Solves</div>
<div class="card" style="font-size:13px;color:var(--muted2);line-height:1.85;font-weight:300;">
  India's education system runs on a massive, structurally strained institutional base with over 1,000 universities and 40,000+ colleges, where faculty-to-student ratios are stretched and administrative burden on educators is high. <strong style="color:var(--text);font-weight:500;">The manual evaluation of answer sheets sits at the centre of this burden.</strong>
  <br/><br/>The market is dominated by cloud-first platforms — 60.1% of global AI-in-education revenue in 2024 — yet most Indian institutions cannot accept the data governance trade-offs that come with sending student data to external servers. India's DPDP Act (2023) creates real legal exposure for institutions using unmanaged cloud AI.
  <br/><br/><strong style="color:var(--gold);font-weight:500;">The gap: AI tools that genuinely reduce educator workload exist, but none are designed specifically for institutions that require privacy and strict data security.</strong>

document.getElementById('funnelEl').innerHTML=FUNNEL.map(f=>`<div style="width:100%;display:flex;justify-content:center;margin-bottom:2px;"><div class="fs" style="width:${f.w};max-width:100%;background:${f.bg};padding:9px 18px;border-radius:5px;display:flex;justify-content:space-between;align-items:center;gap:14px;"><span class="fl">${f.l}</span><span class="fv">${f.n}</span></div></div>`).join('');

let rC,cC,iC;
function gI(){return{price:+document.getElementById('s-price').value,y1:+document.getElementById('s-y1').value,y2:+document.getElementById('s-y2').value,y3:+document.getElementById('s-y3').value,inv:+document.getElementById('s-inv').value,onb:+document.getElementById('s-onb').value,sup:+document.getElementById('s-sup').value,disc:+document.getElementById('s-disc').value/100};}
function calc(i){const{price,y1,y2,y3,inv,onb,sup,disc}=i;const SC=300000;const rev=[y1,y2,y3].map(n=>n*price);const op=[y1,y2,y3].map(n=>n*onb+n*sup+SC);const ncf=rev.map((r,i)=>r-op[i]);const df=ncf.map((_,i)=>1/Math.pow(1+disc,i+1));const dcf=ncf.map((cf,i)=>cf*df[i]);const tpv=dcf.reduce((a,b)=>a+b,0);const npv=tpv-inv;const tn=ncf.reduce((a,b)=>a+b,0);let cum=-inv,pb=null;for(let i=0;i<ncf.length;i++){const p=cum;cum+=ncf[i];if(cum>=0&&pb===null)pb=i+(-p/ncf[i]);}let lo=-0.99,hi=25;for(let k=0;k<500;k++){const m=(lo+hi)/2;const v=ncf.reduce((a,cf,i)=>a+cf/Math.pow(1+m,i+1),-inv);if(v>0)lo=m;else hi=m;}const irr=(lo+hi)/2;return{rev,op,ncf,df,dcf,tpv,npv,tn,irr,pi:tpv/inv,pb,roi:tn/inv,inv};}
function fi(n){const a=Math.abs(n);const s=n<0?'-':'';if(a>=10000000)return s+'Rs.'+(a/10000000).toFixed(2)+'Cr';if(a>=100000)return s+'Rs.'+(a/100000).toFixed(2)+'L';if(a>=1000)return s+'Rs.'+(a/1000).toFixed(0)+'K';return s+'Rs.'+a.toFixed(0);}
function upL(i){document.getElementById('sv-price').textContent='Rs.'+(i.price/100000).toFixed(1)+'L';document.getElementById('sv-y1').textContent=i.y1;document.getElementById('sv-y2').textContent=i.y2;document.getElementById('sv-y3').textContent=i.y3;document.getElementById('sv-inv').textContent='Rs.'+(i.inv/100000).toFixed(0)+'L';document.getElementById('sv-onb').textContent='Rs.'+(i.onb/1000).toFixed(0)+'K';document.getElementById('sv-sup').textContent='Rs.'+(i.sup/1000).toFixed(0)+'K';document.getElementById('sv-disc').textContent=(i.disc*100).toFixed(0)+'%';}
function upK(f,i){const pb=f.pb!==null?`${Math.floor(f.pb)}y ${Math.round((f.pb-Math.floor(f.pb))*12)}m`:'> 3yr';const ks=[{l:'NPV',v:fi(f.npv),c:f.npv>=0?'#2dd4bf':'#f87171'},{l:'IRR',v:(f.irr*100).toFixed(0)+'%',c:f.irr>i.disc?'#2dd4bf':'#f87171'},{l:'Payback',v:pb,c:'#fbbf24'},{l:'ROI (3yr)',v:(f.roi*100).toFixed(0)+'%',c:'#2dd4bf'},{l:'Profit. Index',v:f.pi.toFixed(2),c:f.pi>1?'#2dd4bf':'#f87171'},{l:'Total PV',v:fi(f.tpv),c:'#c9a84c'}];document.getElementById('kpiStrip').innerHTML=ks.map(k=>`<div class="kbox"><div class="kv" style="color:${k.c}">${k.v}</div><div class="kl">${k.l}</div></div>`).join('');}
function upD(f){let cp=-f.inv;const rows=[`<tr><td>Year 0</td><td>—</td><td>${fi(f.inv)}</td><td class="tr">${fi(-f.inv)}</td><td>1.000</td><td class="tr">${fi(-f.inv)}</td><td class="tr">${fi(-f.inv)}</td></tr>`];f.ncf.forEach((n,i)=>{cp+=f.dcf[i];rows.push(`<tr><td>Year ${i+1}</td><td class="tg">${fi(f.rev[i])}</td><td>${fi(f.op[i])}</td><td class="${n>=0?'tg':'tr'}">${fi(n)}</td><td>${f.df[i].toFixed(3)}</td><td class="tg">${fi(f.dcf[i])}</td><td class="${cp>=0?'tg':'tr'}">${fi(cp)}</td></tr>`);});document.getElementById('dcfBody').innerHTML=rows.join('');}
function upCh(f){if(rC)rC.destroy();rC=new Chart(document.getElementById('revC'),{type:'bar',data:{labels:['Year 1','Year 2','Year 3'],datasets:[{label:'Revenue',data:f.rev,backgroundColor:'rgba(45,212,191,0.68)',borderRadius:4},{label:'Operating Costs',data:f.op,backgroundColor:'rgba(248,113,113,0.58)',borderRadius:4}]},options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true,grid:{color:'rgba(31,31,46,0.5)'},ticks:{callback:v=>fi(v)}},x:{grid:{display:false}}}}});if(cC)cC.destroy();const cum=[-f.inv];let c=-f.inv;f.ncf.forEach(n=>{c+=n;cum.push(c);});cC=new Chart(document.getElementById('cfC'),{type:'line',data:{labels:['Y0','Year 1','Year 2','Year 3'],datasets:[{label:'Cumulative CF',data:cum,borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,0.07)',fill:true,tension:0.4,pointRadius:5,pointBackgroundColor:cum.map(v=>v>=0?'#2dd4bf':'#f87171')}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(31,31,46,0.5)'},ticks:{callback:v=>fi(v)}},x:{grid:{display:false}}}}});}
function upS(i){const prices=[200000,300000,400000,500000,600000,700000,800000];const insts=[2,3,5,7,10,15,20];let h='<table class="st2"><tr><th>Y1 / Price</th>';prices.forEach(p=>{h+=`<th>Rs.${(p/100000).toFixed(1)}L</th>`;});h+='</tr>';insts.forEach(n=>{h+=`<tr><td>${n} inst.</td>`;prices.forEach(p=>{const nc=[n,n*3,n*7].map(ni=>ni*p-(ni*i.onb+ni*i.sup+300000));const pv=nc.reduce((a,cf,ii)=>a+cf/Math.pow(1+i.disc,ii+1),0);const nv=Math.round(pv-i.inv);const pos=nv>=0;h+=`<td style="color:${pos?'#2dd4bf':'#f87171'};background:${pos?`rgba(45,212,191,${Math.min(0.2,nv/20000000)})`:`rgba(248,113,113,${Math.min(0.22,Math.abs(nv)/10000000)})`}">${pos?'':'-'}Rs.${(Math.abs(nv)/100000).toFixed(1)}L</td>`;});h+='</tr>';});h+='</table>';document.getElementById('sensWrap').innerHTML=h;}
function upI(f,i){if(iC)iC.destroy();const rates=[0,0.1,0.2,0.5,1,1.5,2,2.5,3,4,5];const npvs=rates.map(r=>f.ncf.reduce((a,cf,ii)=>a+cf/Math.pow(1+r,ii+1),-f.inv));iC=new Chart(document.getElementById('irrC'),{type:'line',data:{labels:rates.map(r=>`${(r*100).toFixed(0)}%`),datasets:[{label:'NPV',data:npvs,borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,0.06)',fill:true,tension:0.4,pointRadius:4},{label:'NPV = 0',data:rates.map(()=>0),borderColor:'rgba(248,113,113,0.38)',borderDash:[5,5],pointRadius:0,borderWidth:1}]},options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{grid:{color:'rgba(31,31,46,0.5)'},ticks:{callback:v=>fi(v)}},x:{grid:{display:false}}}}});const pb=f.pb!==null?`${Math.floor(f.pb)} year${Math.floor(f.pb)!==1?'s':''} and ${Math.round((f.pb-Math.floor(f.pb))*12)} months`:'Not recovered in 3 years';document.getElementById('irrOut').innerHTML=`<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-bottom:8px;">CURRENT RESULTS</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:11.5px;"><div><span style="color:var(--muted);">IRR ≈ </span><strong style="color:#2dd4bf;">${(f.irr*100).toFixed(1)}%</strong></div><div><span style="color:var(--muted);">Hurdle: </span><strong style="color:#c9a84c;">${(i.disc*100).toFixed(0)}%</strong></div><div><span style="color:var(--muted);">NPV: </span><strong style="color:${f.npv>=0?'#2dd4bf':'#f87171'};">${fi(f.npv)}</strong></div><div><span style="color:var(--muted);">Payback: </span><strong style="color:#fbbf24;">${pb}</strong></div></div>`;}
function refresh(){const i=gI();upL(i);const f=calc(i);upK(f,i);upD(f);upCh(f);upS(i);upI(f,i);}
['s-price','s-y1','s-y2','s-y3','s-inv','s-onb','s-sup','s-disc'].forEach(id=>{document.getElementById(id).addEventListener('input',refresh);});
refresh();
function go(id){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-i').forEach(n=>n.classList.remove('active'));document.getElementById('tab-'+id).classList.add('active');document.querySelector(`.nav-i[data-tab="${id}"]`).classList.add('active');window.scrollTo(0,0);if(id==='revenue')refresh();}
document.querySelectorAll('.nav-i').forEach(item=>{item.addEventListener('click',()=>go(item.dataset.tab));});
</script>
</body>
</html>
